spring.application.name=AiAgentDemo

# 智谱 AI OpenAI 兼容接口配置
spring.ai.openai.base-url=https://open.bigmodel.cn/api/paas/v4
spring.ai.openai.api-key=
spring.ai.openai.chat.options.model=glm-4.6
spring.ai.openai.embedding.options.model=embedding-3
spring.ai.openai.embedding.embeddings-path=/embeddings
spring.ai.openai.chat.completions-path=/chat/completions

# Rerank 重排配置
rag.rerank.path=/rerank
rag.rerank.model=rerank

#spring.ai.openai.base-url=https://idealab.alibaba-inc.com/api/openai
#spring.ai.openai.api-key=
#spring.ai.openai.chat.options.model=qwen3.6-plus
#spring.ai.openai.embedding.options.model=text-embedding-v2


# 当前 MCP SDK 会先尝试 Streamable HTTP；SSE 服务可能返回 405。
# 该日志属于协议兼容性探测，降级为 ERROR 以减少控制台噪音。
logging.level.io.modelcontextprotocol.client.LifecycleInitializer=ERROR

# IDEAs 应用配置（按需开启，可配置多个应用）
#ideas.base-url=https://aistudio.alibaba-inc.com/api/aiapp/run
#ideas.apps[0].name=翻译助手
#ideas.apps[0].ak=你的AK
#ideas.apps[0].app-code=应用代码
#ideas.apps[0].app-version=latest
#ideas.apps[0].description=专业的多语言翻译工具（必填，LLM 根据此描述决定何时调用）

# MCP Server 配置 测试本地提交
spring.ai.mcp.server.name=AiAgentDemo-MCP-Server
spring.ai.mcp.server.version=1.0.0
